# railway.toml — Atom OS API deployment config
[build]
builder = "nixpacks"
buildCommand = "npm install && cd packages/shared && npm run build && cd ../../apps/api && npm run build"

[deploy]
startCommand = "cd apps/api && node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
